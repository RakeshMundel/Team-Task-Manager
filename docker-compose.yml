services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: task_manager
      MYSQL_USER: task_user
      MYSQL_PASSWORD: task_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - task_manager_mysql:/var/lib/mysql

volumes:
  task_manager_mysql:
